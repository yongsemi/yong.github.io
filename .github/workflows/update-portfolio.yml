name: 📈 Update Portfolio Prices

on:
  schedule:
    # 13:30 Taipei time (UTC+8) = 05:30 UTC, every day
    - cron: '30 5 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests pytz

      - name: Update portfolio prices
        run: python stock-inventory/update_portfolio.py
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
